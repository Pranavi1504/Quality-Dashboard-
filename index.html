<!DOCTYPE html>
<html>
<head>
  <title>Inspection Dashboard</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .header {
      background: linear-gradient(135deg, #5a0000, #800000);
      color: white;
      padding: 25px;
      text-align: center;
      font-size: 30px;
      font-weight: 600;
    }

    .container {
      padding: 30px;
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      width: 220px;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      border-top: 4px solid #800000;
    }

    .card h3 {
      color: #444;
    }

    .card p {
      font-size: 28px;
      font-weight: bold;
      color: #800000;
    }

    .chart-container {
      width: 80%;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
  </style>
</head>

<body>

<div class="header">
  Inspection Dashboard
</div>

<div class="container">
  <div class="card">
    <h3>Total</h3>
    <p id="total">--</p>
  </div>

  <div class="card">
    <h3>Pending</h3>
    <p id="pending">--</p>
  </div>

  <div class="card">
    <h3>Completed</h3>
    <p id="completed">--</p>
  </div>
</div>

<div class="chart-container">
  <div id="chart_div" style="width: 100%; height: 400px;"></div>
</div>

<script>
  google.charts.load('current', {'packages':['corechart']});
  google.charts.setOnLoadCallback(drawChart);

  function drawChart() {

    var query = new google.visualization.Query('YOUR_CSV_LINK');

    query.send(function(response) {

      if (response.isError()) {
        console.log(response.getMessage());
        return;
      }

      var data = response.getDataTable();

      var total = data.getNumberOfRows();
      document.getElementById("total").innerText = total;

      var pending = 0;
      var completed = 0;

      for (var i = 0; i < total; i++) {
        var status = data.getValue(i, 1);

        if (status === "Pending") pending++;
        if (status === "Completed") completed++;
      }

      document.getElementById("pending").innerText = pending;
      document.getElementById("completed").innerText = completed;

      var chartData = google.visualization.arrayToDataTable([
        ['Status', 'Count'],
        ['Pending', pending],
        ['Completed', completed]
      ]);

      var options = {
        title: 'Inspection Status',
        colors: ['#800000', '#333333'],
        pieHole: 0.4
      };

      var chart = new google.visualization.PieChart(document.getElementById('chart_div'));
      chart.draw(chartData, options);

    });
  }
</script>

</body>
</html>
