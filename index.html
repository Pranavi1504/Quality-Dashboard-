<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTeZnoo7bQLjzBf3tjqYLjtHMAy-n8Y35y0dqpPhqDacX3Vau8VSxinbvJ6ZirAZKeGX2fRBgnDvaCn/pub?gid=2111416219&single=true&output=csv";

Papa.parse(SHEET_URL, {
  download: true,
  header: true,
  complete: function(results) {

    const data = results.data;

    let total = 0;
    let pass = 0;
    let fail = 0;
    let totalDefects = 0;

    let vendorMap = {};
    let inspectionMap = {};
    let orders = new Set();

    data.forEach(row => {

      if (!row || Object.keys(row).length === 0) return;
      total++;

      let status = "";
      let vendor = "";
      let defects = 0;
      let inspectionType = "";
      let orderID = "";

      for (let key in row) {
        let k = key.toLowerCase();

        if (k.includes("status")) status = row[key];
        if (k.includes("vendor")) vendor = row[key];
        if (k.includes("defect")) defects = parseInt(row[key]) || 0;
        if (k.includes("inspection")) inspectionType = row[key];
        if (k.includes("qr") || k.includes("order")) orderID = row[key];
      }

      status = (status || "").toLowerCase();

      if (status.includes("pass")) pass++;
      else if (status.includes("fail")) fail++;

      totalDefects += defects;

      // Vendor count
      if (vendor) {
        vendorMap[vendor] = (vendorMap[vendor] || 0) + 1;
      }

      // Inspection type count
      if (inspectionType) {
        inspectionMap[inspectionType] = (inspectionMap[inspectionType] || 0) + 1;
      }

      // Unique orders
      if (orderID) {
        orders.add(orderID);
      }

    });

    // Metrics
    const passRate = ((pass / total) * 100).toFixed(1);
    const failRate = ((fail / total) * 100).toFixed(1);
    const defectRate = (totalDefects / total).toFixed(2);
    const orderCoverage = ((orders.size / total) * 100).toFixed(1);

    // Update UI (you can add cards later)
    document.getElementById("total").innerText = total;
    document.getElementById("pending").innerText = fail; // optional reuse
    document.getElementById("completed").innerText = pass;

    // PASS/FAIL CHART
    new Chart(document.getElementById("chart"), {
      type: 'doughnut',
      data: {
        labels: ['Pass','Fail'],
        datasets: [{
          data: [pass, fail],
          backgroundColor: ['#800000','#333']
        }]
      }
    });

    // VENDOR CHART
    new Chart(document.getElementById("vendorChart"), {
      type: 'bar',
      data: {
        labels: Object.keys(vendorMap),
        datasets: [{
          label: 'Inspections',
          data: Object.values(vendorMap),
          backgroundColor: '#800000'
        }]
      }
    });

    // INSPECTION TYPE CHART
    new Chart(document.getElementById("typeChart"), {
      type: 'pie',
      data: {
        labels: Object.keys(inspectionMap),
        datasets: [{
          data: Object.values(inspectionMap),
          backgroundColor: ['#800000','#333','#999']
        }]
      }
    });

    console.log({
      passRate,
      failRate,
      defectRate,
      orderCoverage
    });

  }
});

</script>
